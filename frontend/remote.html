<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Remote Control - Pepper</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/style.css">
    <style>
      .qr-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 70vh;
        padding: 2rem;
        text-align: center;
      }

      .qr-code {
        background: white;
        padding: 2rem;
        border-radius: 1rem;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        margin: 2rem 0;
      }

      .qr-code canvas {
        display: block;
        margin: 0 auto;
      }

      .qr-instructions {
        max-width: 500px;
        margin: 1rem auto;
      }

      .qr-instructions h2 {
        font-size: 1.8rem;
        margin-bottom: 1rem;
        color: #333;
      }

      .qr-instructions p {
        font-size: 1.2rem;
        color: #666;
        line-height: 1.6;
      }

      .qr-url {
        background: #f5f5f5;
        padding: 1rem;
        border-radius: 0.5rem;
        margin-top: 1.5rem;
        font-family: monospace;
        font-size: 1.1rem;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <a href="index.html" class="back-button-fixed">← Back</a>

    <div class="qr-container">
      <div class="qr-instructions">
        <h2>📱 Remote Control via Mobile</h2>
        <p>Scan this QR code with your phone to control Pepper remotely</p>
      </div>

      <div class="qr-code" id="qr-code">
        <!-- QR code will be generated here -->
      </div>
    </div>

    <!-- QR Code generation library (local) -->
    <script src="js/qrcode.min.js"></script>
    <script src="js/remote.js"></script>
  </body>
</html>
