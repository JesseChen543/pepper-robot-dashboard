<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Camera - Pepper Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="css/style.css?v=9">
    <style>
      .camera-container {
        padding: 10px 20px 20px 20px;
        max-width: 900px;
        margin: 0 auto;
        display: flex;
        align-items: flex-start;
        gap: 20px;
      }

      .camera-left {
        flex-shrink: 0;
      }

      .camera-right {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .side-control-btn {
        padding: 10px 15px;
        font-size: 14px;
        font-weight: bold;
        background-color: #38bdf8 !important;
        color: white !important;
        border: 2px solid white !important;
        border-radius: 6px;
        cursor: pointer;
        text-align: center;
        margin-bottom: 10px;
        min-width: 140px;
        transition: all 0.2s;
        box-shadow: 0 2px 8px rgba(56, 189, 248, 0.3);
      }

      .side-control-btn.active {
        background-color: #22c55e !important;
        box-shadow: 0 2px 8px rgba(34, 197, 94, 0.3);
      }

      .side-control-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(56, 189, 248, 0.4);
      }

      .side-control-btn.active:hover {
        box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
      }

      .side-control-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .camera-viewfinder {
        position: relative;
        width: 540px;
        background: #000;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      }

      .camera-viewfinder canvas {
        display: block;
        width: 100%;
        height: auto;
      }

      .camera-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.3) 100%);
      }

      .camera-countdown {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.9);
        font-size: 96px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.92);
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
        pointer-events: none;
        opacity: 0;
        transition: opacity 150ms ease, transform 150ms ease;
        z-index: 2;
      }

      .camera-countdown.show {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      .camera-status {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.6);
        padding: 5px 10px;
        border-radius: 6px;
        color: white;
        font-size: 12px;
        font-weight: bold;
      }

      .camera-status.active {
        background: rgba(34, 197, 94, 0.8);
      }

      .take-picture-btn-center {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: 3px solid white;
        border-radius: 50%;
        font-size: 26px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        transition: all 0.2s;
        box-shadow: 0 3px 10px rgba(102, 126, 234, 0.4);
      }

      .take-picture-btn-center:hover {
        transform: scale(1.1);
        box-shadow: 0 6px 16px rgba(102, 126, 234, 0.5);
      }

      .take-picture-btn-center:active {
        transform: scale(0.95);
      }

      .take-picture-btn-center:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .status-message {
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 15px;
        font-size: 14px;
        display: none;
      }

      .status-message.success {
        background: rgba(34, 197, 94, 0.2);
        border: 1px solid rgba(34, 197, 94, 0.5);
        color: #4ade80;
      }

      .status-message.error {
        background: rgba(239, 68, 68, 0.2);
        border: 1px solid rgba(239, 68, 68, 0.5);
        color: #f87171;
      }

      .status-message.show {
        display: block;
      }

      .camera-info {
        text-align: center;
        color: rgba(248, 250, 252, 0.6);
        font-size: 14px;
        margin-top: 10px;
      }

      /* Head Control Styles */
      .head-control-section {
        padding: 15px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .control-buttons {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 15px;
      }

      .head-control-title {
        text-align: center;
        color: rgba(248, 250, 252, 0.9);
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 12px;
      }

      .camera-control-hint {
        text-align: center;
        color: rgba(251, 191, 36, 0.9);
        font-size: 12px;
        padding: 6px 10px;
        background: rgba(251, 191, 36, 0.1);
        border: 1px solid rgba(251, 191, 36, 0.3);
        border-radius: 6px;
        margin-bottom: 10px;
        visibility: visible;
        opacity: 1;
        transition: opacity 0.2s, visibility 0.2s;
      }

      .camera-control-hint.hidden {
        visibility: hidden;
        opacity: 0;
      }

      .head-control-pad {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 0 auto;
      }

      .head-control-row {
        display: flex;
        justify-content: center;
        margin-bottom: 6px;
      }

      .head-control-btn {
        width: 50px;
        height: 50px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: 2px solid white;
        border-radius: 8px;
        font-size: 22px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        transition: all 0.15s;
        margin: 0 3px;
      }

      .head-control-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
      }

      .head-control-btn:active {
        transform: scale(0.95);
      }

      .head-btn-center {
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      }
    </style>
  </head>
  <body>
    <a href="index.html" class="back-button-fixed">← Back</a>
    <header style="margin-bottom: 14px;">
      <h1 class="page-title" style="margin-top: 40px;">Camera</h1>
      <div class="status-pill" id="status-pill">[--] Connecting...</div>
    </header>

    <section class="panel active">
      <div class="panel-header">
        <a href="index.html" class="back-button"></a>
      </div>

      <div class="camera-container">
        <div class="camera-left">
          <div id="status-message" class="status-message"></div>
          <div class="camera-viewfinder">
            <canvas id="camera-canvas" width="320" height="240"></canvas>
            <div class="camera-overlay">
              <div class="camera-status" id="camera-status">Connecting...</div>
            </div>
            <div class="camera-countdown" id="camera-countdown"></div>
          </div>
        </div>

        <div class="camera-right">
          <div class="head-control-section">
            <div class="head-control-title">Camera Control</div>
            <div id="camera-control-hint" class="camera-control-hint">
              💡 Enable Static Head to use camera controls
            </div>
            <div class="head-control-pad">
              <div class="head-control-row">
                <button class="head-control-btn head-btn-up" data-direction="up">⬆️</button>
              </div>
              <div class="head-control-row">
                <button class="head-control-btn head-btn-left" data-direction="left">⬅️</button>
                <button id="take-picture-btn" class="take-picture-btn-center" disabled>📷</button>
                <button class="head-control-btn head-btn-right" data-direction="right">➡️</button>
              </div>
              <div class="head-control-row">
                <button class="head-control-btn head-btn-down" data-direction="down">⬇️</button>
              </div>
            </div>
            <div class="control-buttons">
              <button id="static-head-btn" class="side-control-btn">🔒 Static Head</button>
              <button id="reset-camera-btn" class="side-control-btn">⚪ Reset Camera</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="js/camera.js?v=8"></script>
  </body>
</html>
